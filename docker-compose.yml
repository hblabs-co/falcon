services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: falcon

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

  nats:
    image: nats:2-alpine
    command: ["-js"]   # enable JetStream
    ports:
      - "4222:4222"   # client connections
      - "8222:8222"   # HTTP monitoring
    volumes:
      - nats_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

  # ---------------------------------------------------------------------------
  # Ollama is intentionally NOT run in Docker on Apple Silicon (M-series).
  # Docker on macOS runs inside a Linux VM and has no access to the Metal GPU,
  # forcing CPU-only inference (~23s per embedding with bge-m3).
  # Running Ollama natively gives Metal GPU acceleration (<1s per embedding).
  #
  # To use the Docker version instead (e.g. on Linux with NVIDIA GPU):
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   entrypoint: ["/bin/sh", "-c"]
  #   command:
  #     - |
  #       ollama serve &
  #       until ollama list > /dev/null 2>&1; do sleep 1; done
  #       ollama pull bge-m3
  #       wait
  # ---------------------------------------------------------------------------

volumes:
  mongo_data:
  qdrant_data:
  nats_data:
  minio_data:
  ollama_data:

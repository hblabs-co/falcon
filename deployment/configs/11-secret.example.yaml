# COPY TO 11-secret.yaml AND FILL IN. Do NOT commit the real file.
# All values are stringData (plain text) — kubectl base64-encodes them.
apiVersion: v1
kind: Secret
metadata:
  name: falcon-secrets
  namespace: falcon
type: Opaque
stringData:
  # Shared across services that hit external APIs / sign tokens.
  JWT_SECRET:              "change-me-long-random-string"
  REALTIME_SHARED_SECRET:  "change-me-matches-ios-client-Config.realtimeSecret"

  # LLM providers (normalizer, match-engine).
  LLM_URL: "https://api.my.ai"
  LLM_API_KEY: "sssss"
  LLM_MODEL: "my-small-latest"
  LLM_PROVIDER: "my"

  ## embedding
  # Qdrant REST API port (HTTP/1.x). Do NOT use 6334 — that's the gRPC
  # port (HTTP/2) and the Go client makes REST calls to /collections/...
  QDRANT_URL: "http://qdrant.svc.cluster.local:6333"
  EMBEDDINGS_URL: "https://api.my.ai/v1/embeddings"
  EMBEDDINGS_API_KEY: "sssss"
  EMBEDDINGS_MODEL: "my-small-latest"
  QDRANT_COLLECTION: "col"
  DISPATCH_TOP_N: "20"
  DISPATCH_SCORE_THRESHOLD: "0.6"

  # Email (signal — magic links + admin alerts).
  MAILJET_API_KEY:         "..."
  MAILJET_SECRET_KEY:      "..."
  MAIL_FROM:               "hello@hblabs.co"
  ADMIN_EMAILS:            "you@hblabs.co"

  # APNs (signal — push notifications + Live Activities).
  APNS_PRODUCTION:         "true"
  APNS_KEY_ID:             "XXXXXXXXXXXXX"
  APNS_TEAM_ID:            "..."
  APNS_BUNDLE_ID:          "co.hblabs.falcon.Falcon"
  # Path inside the pod where APNS_AUTH_KEY is projected as a file by
  # the volume mount in 30-signal.yaml. The apns2 library loads the .p8
  # via token.AuthKeyFromFile(path) — it must be a real filesystem entry.
  APNS_KEY_PATH:           "/etc/apns/AuthKey.p8"
  APNS_AUTH_KEY:           |
    -----BEGIN PRIVATE KEY-----
    MIG...paste AuthKey_XXXX.p8 contents...
    -----END PRIVATE KEY-----

  # MinIO (storage).
  MINIO_ACCESS_KEY:        "..."
  MINIO_SECRET_KEY:        "..."
  MINIO_BUCKET:            "falcon"

  # Mongo (if your cluster requires auth).
  MONGODB_USER:            ""
  MONGODB_PASSWORD:        ""





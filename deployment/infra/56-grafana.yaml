## kubectl apply -f deployment/infra/56-grafana.yaml
##
## Grafana — query UI for Loki. Single replica, no built-in alerting
## or dashboards beyond what we provision below. The Loki datasource
## is auto-provisioned at startup so a fresh pod is ready to query
## without anyone clicking through the UI.
##
## Auth: ADMIN_USER / GRAFANA_ADMIN_PASSWORD pulled from
## falcon-secrets — add `GRAFANA_ADMIN_PASSWORD: "<long-random>"` to
## 11-secret.yaml before applying this manifest.
##
## Storage: emptyDir. All persistent config (datasource, future
## dashboards) lives in the ConfigMap → restart-safe. If you start
## creating ad-hoc dashboards in the UI you'll lose them on pod
## restart — replace with a PVC then.

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: falcon
data:
  # Datasource provisioning — Grafana scans /etc/grafana/provisioning
  # at startup and reconciles every YAML it finds. Loki gets wired
  # to the cluster-internal service URL; isDefault marks it as the
  # one selected by default in the Explore tab.
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.falcon.svc.cluster.local:3100
        isDefault: true
        editable: false
        jsonData:
          # Reasonable upper bound on how many lines a single Explore
          # query returns. Loki's hard cap is `max_entries_limit_per_query`
          # in loki.yaml (default 5000) — keep these in sync.
          maxLines: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: falcon
  labels: {app: grafana}
spec:
  type: ClusterIP
  ports:
    - {name: http, port: 80, targetPort: 3000}
  selector: {app: grafana}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: falcon
  labels: {app: grafana}
spec:
  replicas: 1
  selector: {matchLabels: {app: grafana}}
  template:
    metadata:
      labels: {app: grafana}
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.4.0
          ports:
            - {name: http, containerPort: 3000}
          env:
            - {name: GF_SECURITY_ADMIN_USER, value: "admin"}
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: falcon-secrets
                  key: GRAFANA_ADMIN_PASSWORD
            # Disable user signup — single admin, internal use.
            - {name: GF_USERS_ALLOW_SIGN_UP, value: "false"}
            # Surface the public URL Grafana uses in alert / share
            # links. Match the Ingress host below.
            - {name: GF_SERVER_ROOT_URL, value: "https://grafana.falcon.hblabs.co"}
            # Tell Grafana to scan the provisioning dir we mount.
            - {name: GF_PATHS_PROVISIONING, value: "/etc/grafana/provisioning"}
          volumeMounts:
            # Provisioning needs the file on the right subpath:
            # /etc/grafana/provisioning/datasources/<anything>.yaml
            - name: provisioning
              mountPath: /etc/grafana/provisioning/datasources
          readinessProbe:
            httpGet: {path: /api/health, port: http}
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet: {path: /api/health, port: http}
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: {cpu: "100m", memory: "128Mi"}
            limits:   {cpu: "500m", memory: "512Mi"}
      volumes:
        - name: provisioning
          configMap: {name: grafana-provisioning}

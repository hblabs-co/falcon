## kubectl apply -f deployment/infra/54-loki.yaml
##
## Loki — log aggregator. Single-binary mode (all components in one
## pod) which is the recommended starting topology for clusters under
## ~1 TB/day. When you need HA, switch to read/write/backend split:
## https://grafana.com/docs/loki/latest/get-started/deployment-modes/
##
## Storage layout:
##   - chunks (the actual log bytes, ~90% of footprint) → MinIO bucket "loki"
##   - index (which streams live where) → also MinIO via tsdb-shipper
##   - working state (small in-memory index for ingestion) → emptyDir
##
## The init container creates the MinIO bucket on first boot using
## the `mc` client; subsequent boots see it exists and no-op. Reuses
## the same MINIO_ACCESS_KEY / MINIO_SECRET_KEY the rest of Falcon
## already has in falcon-secrets — no new credential to manage.
##
## Retention: 30 days. Adjust `retention_period` below to taste.
## Compactor runs every 10m and deletes object-store entries that
## fall outside the window.


apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: falcon
data:
  loki.yaml: |
    auth_enabled: false  # cluster-internal, single-tenant deployment

    server:
      http_listen_port: 3100
      grpc_listen_port: 9095
      log_level: info

    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki                # working dir (emptyDir mount)
      replication_factor: 1
      ring:
        kvstore: {store: inmemory}
      storage:
        s3:
          endpoint: minio.falcon.svc.cluster.local:9000
          bucketnames: loki
          access_key_id: ${S3_ACCESS_KEY_ID}
          secret_access_key: ${S3_SECRET_ACCESS_KEY}
          insecure: true                # plain HTTP inside the cluster
          s3forcepathstyle: true        # MinIO requires path-style URLs

    schema_config:
      configs:
        - from: 2025-01-01
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: index_
            period: 24h

    storage_config:
      tsdb_shipper:
        active_index_directory: /loki/tsdb-active
        cache_location: /loki/tsdb-cache

    limits_config:
      retention_period: 720h            # 30 days — chunks past this get deleted
      ingestion_rate_mb: 10             # cap per-tenant ingest at 10 MB/s
      ingestion_burst_size_mb: 20
      max_streams_per_user: 10000       # plenty for ~10 services × 50 labels
      reject_old_samples: true
      reject_old_samples_max_age: 168h  # ignore logs older than 7d (clock skew)

    compactor:
      working_directory: /loki/compactor
      retention_enabled: true
      retention_delete_delay: 2h
      retention_delete_worker_count: 50
      delete_request_store: s3

    ruler:
      storage:
        type: local
        local: {directory: /loki/rules}
      rule_path: /loki/rules-temp
      ring:
        kvstore: {store: inmemory}
      enable_api: true
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: falcon
  labels: {app: loki}
spec:
  # ClusterIP — never exposed publicly. Promtail talks to Loki here,
  # Grafana queries Loki here. Port-forward for local debugging:
  #   kubectl port-forward -n falcon svc/loki 3100:3100
  type: ClusterIP
  ports:
    - {name: http, port: 3100, targetPort: 3100}
    - {name: grpc, port: 9095, targetPort: 9095}
  selector: {app: loki}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki
  namespace: falcon
spec:
  serviceName: loki
  replicas: 1
  selector: {matchLabels: {app: loki}}
  template:
    metadata:
      labels: {app: loki}
    spec:
      # Init container: create the MinIO bucket on first boot.
      # Idempotent — `mc mb --ignore-existing` is a no-op when the
      # bucket already exists. Same falcon-secrets the rest of the
      # stack uses, so no new credential to rotate.
      initContainers:
        - name: ensure-bucket
          image: minio/mc:latest
          env:
            - {name: MINIO_ACCESS_KEY, valueFrom: {secretKeyRef: {name: falcon-secrets, key: MINIO_ACCESS_KEY}}}
            - {name: MINIO_SECRET_KEY, valueFrom: {secretKeyRef: {name: falcon-secrets, key: MINIO_SECRET_KEY}}}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              mc alias set local http://minio.falcon.svc.cluster.local:9000 "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
              mc mb --ignore-existing local/loki
              echo "loki bucket ready"
      containers:
        - name: loki
          image: grafana/loki:3.3.2
          args: ["-config.file=/etc/loki/loki.yaml", "-config.expand-env=true"]
          ports:
            - {name: http, containerPort: 3100}
            - {name: grpc, containerPort: 9095}
          env:
            - {name: S3_ACCESS_KEY_ID,     valueFrom: {secretKeyRef: {name: falcon-secrets, key: MINIO_ACCESS_KEY}}}
            - {name: S3_SECRET_ACCESS_KEY, valueFrom: {secretKeyRef: {name: falcon-secrets, key: MINIO_SECRET_KEY}}}
          volumeMounts:
            - {name: config,  mountPath: /etc/loki}
            - {name: storage, mountPath: /loki}
          readinessProbe:
            httpGet: {path: /ready, port: http}
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet: {path: /ready, port: http}
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: {cpu: "200m", memory: "512Mi"}
            limits:   {cpu: "1000m", memory: "1Gi"}
      volumes:
        - name: config
          configMap: {name: loki-config}
        - name: storage
          # emptyDir for working state — actual chunks live in MinIO
          # so a pod restart doesn't lose data, only the local cache.
          # 2Gi is plenty for tsdb-shipper's active index + compactor.
          emptyDir: {sizeLimit: 2Gi}

##############
# Deployment order
#
# # 1. Make sure falcon-secrets has GRAFANA_ADMIN_PASSWORD
# kubectl apply -f deployment/configs/11-secret.yaml
#
# # 2. Loki first (Promtail depends on it to connect; Grafana works
# #    without it but the datasource will be "down")
# kubectl apply -f deployment/infra/54-loki.yaml
# kubectl rollout status -n falcon statefulset/loki --timeout=2m
#
# # 3. Promtail (starts shipping logs as soon as Loki responds)
# kubectl apply -f deployment/infra/55-promtail.yaml
#
# # 4. Grafana
# kubectl apply -f deployment/infra/56-grafana.yaml
# kubectl rollout status -n falcon deployment/grafana --timeout=1m
#
# # 5. Updated ingress (includes grafana.falcon.hblabs.co)
# kubectl apply -f deployment/infra/40-ingress.yaml
#
# How to verify it works
#
# # Loki ready
# kubectl exec -n falcon deploy/grafana -- wget -qO- http://loki:3100/ready
#
# # Promtail discovered pods (should list many)
# kubectl exec -n falcon ds/promtail -- wget -qO- http://localhost:9080/targets | grep falcon | head
#
# # Bucket exists in MinIO
# kubectl exec -n falcon statefulset/minio -- mc ls local/loki
#
# # Grafana reachable
# open https://grafana.falcon.hblabs.co
# # login: admin / <GRAFANA_ADMIN_PASSWORD>
# # Explore tab → Loki → query: {namespace="falcon"}
#
# Useful day-1 queries
#
# # All signal logs
# {namespace="falcon", app="falcon-signal"}
#
# # Errors only across any falcon service
# {namespace="falcon", level="error"}
#
# # Search for a specific user (SECURITY_AUDIT-style triage)
# {namespace="falcon"} |= "user@example.com"
#
# # What the cv-reminder logged in the last 24h
# {namespace="falcon", app="falcon-signal"} |= "[cv-reminder]"
#
# # Push notifications delivered (relies on the explicit logging)
# {namespace="falcon", app="falcon-signal"} |= "reminder delivered"
#
# Estimated footprint
#
# - Loki + Promtail + Grafana: ~700 MB RAM, ~0.5 vCPU at idle
# - MinIO storage: ~50-200 MB/day compressed × 30d retention = 1.5-6 GB
# - Once you pass >5 chatty services it grows to 15-20 GB in the bucket
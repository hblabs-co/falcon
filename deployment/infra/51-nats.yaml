## kubectl apply -f deployment/51-nats.yaml

# NATS 2.x with JetStream. Single-node cluster; pair with a PVC so
# stream data survives pod restarts. For multi-node HA, use the NATS
# Helm chart — same Service name keeps the clients (Falcon services)
# happy either way.
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: falcon
  labels: {app: nats}
spec:
  ports:
    - {name: client,  port: 4222, targetPort: 4222}
    - {name: monitor, port: 8222, targetPort: 8222}
  selector: {app: nats}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: falcon
spec:
  serviceName: nats
  replicas: 1
  selector: {matchLabels: {app: nats}}
  template:
    metadata:
      labels: {app: nats}
    spec:
      containers:
        - name: nats
          image: nats:2-alpine
          # -js enables JetStream; -sd sets the persistent store dir
          # (maps onto the PVC below).
          args: ["-js", "-sd", "/data", "-m", "8222"]
          ports:
            - {name: client,  containerPort: 4222}
            - {name: monitor, containerPort: 8222}
          volumeMounts:
            - {name: data, mountPath: /data}
          readinessProbe:
            httpGet: {path: /healthz, port: monitor}
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: {path: /healthz, port: monitor}
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: {cpu: "100m", memory: "128Mi"}
            limits:   {cpu: "500m", memory: "512Mi"}
  volumeClaimTemplates:
    - metadata: {name: data}
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests: {storage: 5Gi}

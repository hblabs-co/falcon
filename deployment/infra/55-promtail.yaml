## kubectl apply -f deployment/infra/55-promtail.yaml
##
## Promtail — log shipper. Runs as a DaemonSet so every node has its
## own pod tailing the local /var/log/pods directory and shipping
## entries to Loki (cluster-internal).
##
## Discovery: Kubernetes SD via the API server. Promtail picks up
## every pod's logs and stamps them with labels (namespace, pod,
## container, app, etc.) — these labels are what Loki indexes, so
## queries like {namespace="falcon", app="falcon-signal"} are O(1).
##
## RBAC: needs read access on pods/nodes/services to learn the
## metadata. Bound at the cluster level because pods are namespaced
## but Promtail tails files on the host filesystem (per-node).
##
## Filtering: every namespace gets shipped by default. The relabel
## block below extracts useful labels from pod metadata; it doesn't
## drop anything, so kube-system + cert-manager + Falcon all flow
## through. If you want to keep Falcon-only, uncomment the drop
## stage marked KEEP_FALCON_ONLY below.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: falcon
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: falcon
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: falcon
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
      log_level: info

    positions:
      # Persisted on the node host so pod restarts don't re-ship logs
      # from the start of each file. hostPath mount below.
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki.falcon.svc.cluster.local:3100/loki/api/v1/push
        # Loki sometimes 503s during a bucket upload — we keep
        # retrying with backoff so a transient hiccup doesn't drop
        # logs.
        backoff_config:
          min_period: 500ms
          max_period: 5m
          max_retries: 10

    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        pipeline_stages:
          # Try parse the message as JSON (logrus default in falcon).
          # Pulled fields become available in the next stages without
          # promoting them to labels — that would explode cardinality.
          - cri: {}     # parse the CRI runtime line wrapper first
          - json:
              expressions:
                level: level
                msg:   msg
          # Promote `level` to a label so {level="error"} works.
          # Bounded set (debug/info/warn/error/fatal) → safe to label.
          - labels:
              level:
        relabel_configs:
          # Falcon-only: drop pods from any other namespace before
          # they enter the pipeline. Without this, Promtail would
          # ship cert-manager, kube-system, longhorn, etc — useful
          # in some clusters but here we only triage Falcon. To
          # broaden later, remove this `keep` action and Loki picks
          # everything up on the next tick.
          - source_labels: [__meta_kubernetes_namespace]
            regex: falcon
            action: keep
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          # The `__path__` label tells Promtail where to read the log
          # files on the host. Pattern matches CRI/containerd's
          # /var/log/pods/<ns>_<pod>_<uid>/<container>/*.log.
          - source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            target_label: __path__
            separator: /
            replacement: /var/log/pods/*$1/*.log
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: falcon
spec:
  selector: {matchLabels: {app: promtail}}
  template:
    metadata:
      labels: {app: promtail}
    spec:
      serviceAccountName: promtail
      # tolerations let Promtail run on tainted nodes (e.g. control-plane).
      # Comment out if you only want it on worker nodes.
      tolerations:
        - operator: Exists
      containers:
        - name: promtail
          image: grafana/promtail:3.3.2
          args:
            - -config.file=/etc/promtail/promtail.yaml
          # CRITICAL: Promtail auto-injects a selector
          # `spec.nodeName=$HOSTNAME` on its kubernetes_sd_config so
          # each DaemonSet pod only tails its own node's logs. Inside
          # a pod, HOSTNAME defaults to the POD NAME (e.g.
          # promtail-2jdq8), not the node name — that would yield
          # 0 targets every time. We override HOSTNAME via the
          # downward API so the auto-selector points at the real
          # node. Without this, /api/v1/targets stays empty forever
          # and /ready returns 500.
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - {name: http-metrics, containerPort: 9080}
          volumeMounts:
            - {name: config,    mountPath: /etc/promtail}
            - {name: positions, mountPath: /run/promtail}
            - {name: pods,      mountPath: /var/log/pods, readOnly: true}
            - {name: containers, mountPath: /var/lib/docker/containers, readOnly: true}
          readinessProbe:
            httpGet: {path: /ready, port: http-metrics}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: {cpu: "50m",  memory: "64Mi"}
            limits:   {cpu: "300m", memory: "256Mi"}
          securityContext:
            # Read-only access to host log files; no privileged ops.
            privileged: false
            runAsUser: 0     # required to read root-owned /var/log/pods
      volumes:
        - name: config
          configMap: {name: promtail-config}
        # Persistent on the node so pod restarts don't re-tail from
        # the start of every file. hostPath survives across pod
        # restarts (but not node replacements — that's fine, a fresh
        # node will re-tail the few hours of logs it has).
        - name: positions
          hostPath: {path: /run/promtail, type: DirectoryOrCreate}
        - name: pods
          hostPath: {path: /var/log/pods}
        - name: containers
          hostPath: {path: /var/lib/docker/containers}

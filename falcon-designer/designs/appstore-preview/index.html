function Logo({ size = 28 }) {
  return <img src="assets/brand/falcon-logo.png" width={size} height={size}
    style={{ borderRadius: size * 0.22, display: 'block' }} crossOrigin="anonymous" />;
}

// iPhone screenshot aspect ratio (1290x2796 ≈ 0.4614)
const SHOT_H = Math.round(SHOT_W * 2796 / 1290); // ~629
const BEZEL = 7; // px — thickness of the phone frame

function PhoneShot({ src, top = 340 }) {
  // Outer wrapper = bezel (black frame). Inner = rounded clipped screenshot.
  const outerW = SHOT_W + BEZEL * 2;
  const outerH = SHOT_H + BEZEL * 2;
  return (
    <div style={{
      position: 'absolute', top,
      left: '50%', marginLeft: -outerW / 2,
      width: outerW, height: outerH,
      borderRadius: 36 + BEZEL,
      background: '#0E0E10',
      padding: BEZEL,
      boxShadow: '0 24px 50px rgba(0,0,0,0.22), 0 6px 16px rgba(0,0,0,0.1)',
      zIndex: 2,
    }}>
      <div style={{
        width: SHOT_W, height: SHOT_H,
        borderRadius: 36, overflow: 'hidden',
        background: '#000',
      }}>
        <img src={src}
          width={SHOT_W} height={SHOT_H}
          style={{ width: SHOT_W, height: SHOT_H, display: 'block', objectFit: 'cover' }}
          crossOrigin="anonymous" />
      </div>
    </div>
  );
}

function GradientBlob({ pos, color }) {
  const base = { position: 'absolute', width: 440, height: 440, borderRadius: '50%',
    background: `radial-gradient(circle, ${color} 0%, transparent 65%)`,
    filter: 'blur(22px)', zIndex: 1, pointerEvents: 'none' };
  if (pos === 'tr') return <div style={{ ...base, top: -140, right: -120 }} />;
  if (pos === 'tl') return <div style={{ ...base, top: -140, left: -120 }} />;
  if (pos === 'bl') return <div style={{ ...base, bottom: -150, left: -140 }} />;
  if (pos === 'br') return <div style={{ ...base, bottom: -150, right: -140 }} />;
  return null;
}

function Root() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  // Standalone (opened directly): show panel by default.
  // Inside the editor iframe: only show when the editor explicitly asks.
  const isStandalone = typeof window !== 'undefined' && window.parent === window;
  const [editMode, setEditMode] = React.useState(isStandalone);

  React.useEffect(() => {
    const handler = (e) => {
      const d = e.data;
      if (!d || typeof d !== 'object') return;
      if (d.type === '__activate_edit_mode') setEditMode(true);
      if (d.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const update = (patch) => {
    setTweaks(prev => {
      const next = { ...prev, ...patch };
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
      return next;
    });
  };

  React.useEffect(() => {
    window.__setTweaks = (patch) => update(patch);
    window.__getTweaks = () => ({ lang: tweaks.lang || 'en', variant: tweaks.variant || 'Light' });
  }, [tweaks.lang, tweaks.variant]);

  const lang = tweaks.lang || 'en';
  const variant = tweaks.variant || 'Light';
  const L = LABELS[lang];

  return (
    <>
      <DesignCanvas>
        <DCSection id="app-store" title={SECTION_TITLES[lang]} subtitle={`${SECTION_SUBS[lang]} · ${variant}`}>
          {SHOT_IDS.map(id => (
            <DCArtboard key={`${lang}-${variant}-${id}`} id={`p${id.padStart(2,'0')}`}
              label={L[id]} width={PREVIEW_W} height={PREVIEW_H}>
              <Preview shotId={id} lang={lang} variant={variant} />
            </DCArtboard>
          ))}
        </DCSection>
      </DesignCanvas>
      <Tweaks value={tweaks} onChange={update} visible={editMode}
              onClose={isStandalone ? () => setEditMode(false) : undefined} />
      {isStandalone && !editMode && <ReopenTweaksButton onClick={() => setEditMode(true)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);

// ========== EXPORT (html2canvas) ==========
// IMPORTANT: use globalThis.Blob etc to avoid scope collisions in this Babel block.
const _Blob = globalThis.Blob;

function downloadBlob(blob, filename) {
  if (!blob || !(blob instanceof _Blob) || blob.size < 1) {
    throw new Error('empty blob for ' + filename);
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { try { a.remove(); URL.revokeObjectURL(url); } catch(e){} }, 2000);
}

async function waitReady() {
  try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch(e){}
  const imgs = Array.from(document.querySelectorAll('[data-dc-slot] .dc-card img'));
  await Promise.all(imgs.map(async (img) => {
    if (!img.complete || img.naturalWidth === 0) {
      await new Promise(r => { img.onload = r; img.onerror = r; });
    }
  }));
  await new Promise(r => setTimeout(r, 250));
}

async function renderCard(card) {
  const W = PREVIEW_W, H = PREVIEW_H;
  const scale = 1290 / W;
  const prevT = card.style.transform;
  card.style.transform = 'none';
  try {
    const canvas = await window.html2canvas(card, {
      width: W,
      height: H,
      windowWidth: W,
      windowHeight: H,
      scale: scale,
      useCORS: true,
      allowTaint: false,
      backgroundColor: '#ffffff',
      logging: false,
      imageTimeout: 15000,
      ignoreElements: (el) => el.classList && (el.classList.contains('per-export-btn') || el.classList.contains('dc-label')),
    });
    const blob = await new Promise((resolve, reject) => {
      canvas.toBlob((b) => b ? resolve(b) : reject(new Error('toBlob returned null')), 'image/png');
    });
    if (!blob || blob.size < 1000) throw new Error('empty render');
    return blob;
  } finally {
    card.style.transform = prevT;
  }
}

async function exportCombo(lang, variant, folder, btn) {
  window.__setTweaks && window.__setTweaks({ lang, variant });
  await new Promise(r => setTimeout(r, 700));
  await waitReady();
  const cards = Array.from(document.querySelectorAll('[data-dc-slot] .dc-card'));
  for (let i = 0; i < cards.length; i++) {
    btn.textContent = `${lang.toUpperCase()} · ${variant} · ${i+1}/${cards.length}…`;
    const slot = cards[i].closest('[data-dc-slot]');
    const label = slot.dataset.dcSlot || `p${i+1}`;
    const blob = await renderCard(cards[i]);
    folder.file(`${label}.png`, blob);
  }
}

async function exportAll() {
  const btn = document.getElementById('export-all-btn');
  const orig = btn.textContent;
  btn.disabled = true;
  const prev = { ...((window.__getTweaks && window.__getTweaks()) || { lang: 'en', variant: 'Light' }) };
  try {
    const zip = new JSZip();
    for (const lang of ['de','en','es']) {
      for (const variant of ['Light','Dark']) {
        const folder = zip.folder(`${lang}-${variant.toLowerCase()}`);
        await exportCombo(lang, variant, folder, btn);
      }
    }
    btn.textContent = 'Zipping…';
    const blob = await zip.generateAsync({ type: 'blob' }, (meta) => {
      btn.textContent = `Zipping ${Math.round(meta.percent)}%…`;
    });
    downloadBlob(blob, 'falcon-app-store-previews-all.zip');
  } catch (e) {
    console.error(e);
    alert('Error: ' + (e && e.message ? e.message : e));
  } finally {
    window.__setTweaks && window.__setTweaks(prev);
    btn.textContent = orig; btn.disabled = false;
  }
}

async function exportCurrent() {
  const btn = document.getElementById('export-current-btn');
  const orig = btn.textContent;
  btn.disabled = true;
  try {
    await waitReady();
    const zip = new JSZip();
    const cards = Array.from(document.querySelectorAll('[data-dc-slot] .dc-card'));
    for (let i = 0; i < cards.length; i++) {
      btn.textContent = `${i+1}/${cards.length}…`;
      const slot = cards[i].closest('[data-dc-slot]');
      const label = slot.dataset.dcSlot || `p${i+1}`;
      const blob = await renderCard(cards[i]);
      zip.file(`${label}.png`, blob);
    }
    const t = (window.__getTweaks && window.__getTweaks()) || {};
    const blob = await zip.generateAsync({ type: 'blob' });
    downloadBlob(blob, `falcon-${t.lang || 'en'}-${(t.variant || 'light').toLowerCase()}.zip`);
  } catch (e) { console.error(e); alert('Error: ' + (e && e.message ? e.message : e)); }
  finally { btn.textContent = orig; btn.disabled = false; }
}

async function exportSingle(index) {
  try {
    await waitReady();
    const cards = Array.from(document.querySelectorAll('[data-dc-slot] .dc-card'));
    const card = cards[index];
    if (!card) throw new Error('no card at ' + index);
    const slot = card.closest('[data-dc-slot]');
    const label = slot.dataset.dcSlot || `p${index+1}`;
    const t = (window.__getTweaks && window.__getTweaks()) || {};
    const blob = await renderCard(card);
    downloadBlob(blob, `falcon-${t.lang || 'en'}-${(t.variant || 'light').toLowerCase()}-${label}.png`);
  } catch (e) { console.error(e); alert('Error: ' + (e && e.message ? e.message : e)); }
}

window.exportSingle = exportSingle;
window.renderCard = renderCard;

// ========== UI ==========
const exportUI = document.createElement('div');
exportUI.innerHTML = `
  <div style="position:fixed; top:18px; right:18px; z-index:200; display:flex; gap:8px;">
    <button id="export-current-btn" style="
      padding:11px 16px; border:none; border-radius:10px;
      background:#fff; color:#0B0B0D; font:600 13px/1 Inter, system-ui;
      cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,0.1);
      border: 1px solid rgba(0,0,0,0.08);
    ">↓ Current (9 PNGs)</button>
    <button id="export-all-btn" style="
      padding:11px 18px; border:none; border-radius:10px;
      background:#0B0B0D; color:#fff; font:600 13px/1 Inter, system-ui;
      cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,0.15);
    ">↓ All 3 langs × 2 variants (54 PNGs)</button>
  </div>
`;
document.body.appendChild(exportUI);
document.getElementById('export-all-btn').onclick = exportAll;
document.getElementById('export-current-btn').onclick = exportCurrent;

function injectPerArtboardButtons() {
  const slots = document.querySelectorAll('[data-dc-slot]');
  slots.forEach((slot) => {
    if (slot.querySelector('.per-export-btn')) return;
    const b = document.createElement('button');
    b.className = 'per-export-btn';
    b.textContent = '↓ PNG';
    Object.assign(b.style, {
      position: 'absolute', top: '-34px', right: '0',
      padding: '5px 10px', border: 'none', borderRadius: '7px',
      background: '#0B0B0D', color: '#fff',
      font: '600 11px/1 Inter, system-ui',
      cursor: 'pointer', zIndex: '50',
      boxShadow: '0 2px 8px rgba(0,0,0,0.15)',
    });
    b.onclick = (e) => {
      e.stopPropagation();
      const idx = Array.from(document.querySelectorAll('[data-dc-slot]')).indexOf(slot);
      window.exportSingle(idx);
    };
    slot.style.position = slot.style.position || 'relative';
    slot.appendChild(b);
  });
}
setInterval(injectPerArtboardButtons, 500);
setTimeout(injectPerArtboardButtons, 800);
</script>
</body>
</html>
